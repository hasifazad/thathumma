<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ------------------------------
   Reset
--------------------------------*/
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            min-height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;

            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

            background: linear-gradient(135deg, #8EC5FC, #E0C3FC);
            padding: 24px;
        }

        /* ------------------------------
   Container
--------------------------------*/
        .wrapper {
            position: relative;

            display: flex;
            justify-content: center;
            align-items: center;

            width: min(90vw, 320px);
            aspect-ratio: 1;
        }

        /* ------------------------------
   Hint Bubble
--------------------------------*/
        .hint {
            position: absolute;
            top: clamp(-10px, -8vw, -0px);

            background: #fff;
            color: #333;

            padding: .6rem 1rem;

            border-radius: 999px;

            font-size: clamp(.8rem, 2vw, .95rem);
            font-weight: 600;
            white-space: nowrap;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .12);

            animation: float 1.8s ease-in-out infinite;
        }

        .hint::after {
            content: "";

            position: absolute;
            left: 50%;
            bottom: -7px;

            width: 14px;
            height: 14px;

            background: #fff;

            transform: translateX(-50%) rotate(45deg);
        }

        /* ------------------------------
   Main Parrot Button
--------------------------------*/
        .speaker {
            width: min(45vw, 180px);
            aspect-ratio: 1;

            border: none;
            border-radius: 50%;

            cursor: pointer;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: clamp(3.5rem, 12vw, 5rem);

            background: #fff;

            box-shadow:
                0 15px 40px rgba(0, 0, 0, .18),
                inset 0 4px 10px rgba(255, 255, 255, .9);

            transition:
                transform .25s ease,
                box-shadow .25s ease;
        }

        .speaker:hover {
            transform: scale(1.08) rotate(-6deg);
        }

        .speaker:active {
            transform: scale(.95);
        }

        .speaker.speaking {
            animation: bounce .45s infinite alternate;
        }

        /* ------------------------------
   Edit Button
--------------------------------*/
        .edit-btn {
            position: absolute;

            right: 6%;
            bottom: 6%;

            width: clamp(40px, 11vw, 52px);
            aspect-ratio: 1;

            border: none;
            border-radius: 50%;

            cursor: pointer;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: clamp(1rem, 4vw, 1.3rem);

            background: #fff;

            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);

            transition: all .25s ease;
        }

        .edit-btn:hover {
            transform: scale(1.1) rotate(12deg);
        }

        .edit-btn:active {
            transform: scale(.95);
        }

        /* ------------------------------
   Animations
--------------------------------*/
        @keyframes bounce {
            from {
                transform: translateY(0) rotate(-4deg);
            }

            to {
                transform: translateY(-10px) rotate(4deg);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* ------------------------------
   Phones
--------------------------------*/
        @media (max-width:480px) {

            body {
                padding: 16px;
            }

            .wrapper {
                width: 82vw;
            }

            .hint {
                top: -50px;
            }
        }

        /* ------------------------------
   Tablets
--------------------------------*/
        @media (min-width:768px) {

            .wrapper {
                width: 320px;
            }
        }

        /* ------------------------------
   Large Screens
--------------------------------*/
        @media (min-width:1200px) {

            .wrapper {
                width: 340px;
            }
        }

        /* ------------------------------
   Touch Devices
--------------------------------*/
        @media (hover:none) {

            .speaker:hover,
            .edit-btn:hover {
                transform: none;
            }
        }
    </style>
</head>

<body>


    <div class="wrapper">
        <div class="hint">👆 Tap me!</div>

        <button class="speaker" id="speakBtn" title="Talk!">
            🦜
        </button>



    </div>
    <button class="edit-btn" id="editBtn" title="Change what the parrot says">
        ✏️
    </button>


    <script>
        const btn = document.getElementById("speakBtn");
        const hint = document.querySelector(".hint");

        let message = "appittaa";
        btn.onclick = () => {
            hint.style.display = "none";
            btn.textContent = "😁";
            speechSynthesis.cancel();

            const speech = new SpeechSynthesisUtterance(
                message
            );

            speech.lang = "hi-IN";
            
            speech.rate = 1;
            speech.pitch = 1.3;

            btn.classList.add("speaking");

            speech.onend = () => {
                btn.classList.remove("speaking");
            };

            speechSynthesis.speak(speech);

            speech.onend = resetParrot;
            speech.onerror = resetParrot;

            function resetParrot() {
                btn.textContent = "🦜";

            }
        };


        document.getElementById("editBtn").onclick = () => {
            const text = prompt(
                "What should the thathumma🦜 say?",
                message
            );

            if (text && text.trim()) {
                message = text.trim().substring(0, 100);
            }
        };



    </script>

</body>

</html>
